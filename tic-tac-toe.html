<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #4ecdc4; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.25rem;
    }

    .score-box .score-x { font-size: 1.6rem; font-weight: 700; color: #ff6b6b; }
    .score-box .score-o { font-size: 1.6rem; font-weight: 700; color: #4ecdc4; }
    .score-box .score-d { font-size: 1.6rem; font-weight: 700; color: #aaa; }

    #reset-btn {
      margin-top: 0.5rem;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover {
      background: #533483;
      transform: scale(1.04);
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box">
      <div class="label">X Wins</div>
      <div class="score-x" id="score-x">0</div>
    </div>
    <div class="score-box">
      <div class="label">Draws</div>
      <div class="score-d" id="score-d">0</div>
    </div>
    <div class="score-box">
      <div class="label">O Wins</div>
      <div class="score-o" id="score-o">0</div>
    </div>
  </div>

  <button id="reset-btn">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      if (!scores) scores = { X: 0, O: 0, D: 0 };
      render();
      setStatus(`Player ${current}'s turn`);
    }

    function render() {
      document.querySelectorAll('.cell').forEach(cell => {
        const i = +cell.dataset.i;
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const i = +cell.dataset.i;
      if (board[i]) return;

      board[i] = current;
      render();

      const win = checkWinner();
      if (win) {
        gameOver = true;
        win.forEach(idx => {
          document.querySelector(`[data-i="${idx}"]`).classList.add('win');
        });
        scores[current]++;
        render();
        setStatus(`Player ${current} wins!`);
        return;
      }

      if (board.every(v => v)) {
        gameOver = true;
        scores.D++;
        render();
        setStatus("It's a draw!");
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`Player ${current}'s turn`);
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('reset-btn').addEventListener('click', init);

    init();
  </script>
</body>
</html>
